name: YouTube Documentary Monitor

on:
  push:
    branches: [ main ]
  schedule:
    # Runs automatically every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install ffmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser deep-translator requests beautifulsoup4 yt-dlp

    - name: Execute Bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot.py

    - name: Commit and Push Tracked Videos List
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add sent_videos.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update tracked videos list [skip ci]" && git push)
